description = '''
anchor, word boundary, character class, quantifier, alternation, and real-world tests.
matches = [[start, end]] in utf8 bytes (half-open intervals).
'''

[[test]]
name = "string_anchor_A_z_plus_no_match"
pattern = '\A[a-zA-Z]+\z'
input = "(asdf)asdf"
matches = []

[[test]]
name = "string_anchor_A_z_star_no_match"
pattern = '\A[a-zA-Z]*\z'
input = "(asdf)asdf"
matches = []

[[test]]
name = "string_anchor_A_z_star_match"
pattern = '\A[a-zA-Z]*\z'
input = "asdfasdf"
matches = [[0, 8]]

[[test]]
name = "string_anchor_A_z_plus_match"
pattern = '\A[a-zA-Z]+\z'
input = "asdfasdf"
matches = [[0, 8]]

# -- anchors --

[[test]]
name = "anchor_digit_exact"
pattern = '^\d$'
input = "1"
matches = [[0, 1]]

[[test]]
name = "anchor_digit_exact_no_match_multidigit"
pattern = '^\d$'
input = "324"
matches = []

[[test]]
name = "anchor_digit_exact_no_match_alpha"
pattern = '^\d$'
input = "a"
matches = []

[[test]]
name = "anchor_digits_star"
pattern = '^\d*$'
input = "123"
matches = [[0, 3]]

[[test]]
name = "anchor_length_range_too_short"
pattern = '^.{4,8}$'
input = "asd"
matches = []

[[test]]
name = "anchor_length_range_min"
pattern = '^.{4,8}$'
input = "asdf"
matches = [[0, 4]]

[[test]]
name = "anchor_length_range_max"
pattern = '^.{4,8}$'
input = "asdfghjk"
matches = [[0, 8]]

[[test]]
name = "anchor_length_range_too_long"
pattern = '^.{4,8}$'
input = "asdfghjkl"
matches = []

[[test]]
name = "anchor_version_string_2_0"
pattern = '\A[0-2](\.[0-9]+)+\z'
input = "2.0"
matches = [[0, 3]]
ignore = true
reason = "\\A/\\z anchors not yet supported"

[[test]]
name = "anchor_version_string_1_2_3"
pattern = '\A[0-2](\.[0-9]+)+\z'
input = "1.2.3"
matches = [[0, 5]]
ignore = true
reason = "\\A/\\z anchors not yet supported"

[[test]]
name = "anchor_version_string_3_0"
pattern = '\A[0-2](\.[0-9]+)+\z'
input = "3.0"
matches = []
ignore = true
reason = "\\A/\\z anchors not yet supported"

[[test]]
name = "anchor_empty_no_match"
pattern = "^Purchase receipt$"
input = ""
matches = []

[[test]]
name = "anchor_decimal"
pattern = '^\d*\.?\d*$'
input = "3.14159"
matches = [[0, 7]]

# -- word boundaries --

[[test]]
name = "word_boundary_11_bare"
pattern = '\b11\b'
input = "11"
matches = [[0, 2]]
ignore = true
reason = "\\b word boundary not yet supported"

[[test]]
name = "word_boundary_11_leading_space"
pattern = '\b11\b'
input = " 11"
matches = [[1, 3]]
ignore = true
reason = "\\b word boundary not yet supported"

[[test]]
name = "word_boundary_11_trailing_space"
pattern = '\b11\b'
input = "11 "
matches = [[0, 2]]
ignore = true
reason = "\\b word boundary not yet supported"

[[test]]
name = "word_boundary_11_both_spaces"
pattern = '\b11\b'
input = " 11 "
matches = [[1, 3]]
ignore = true
reason = "\\b word boundary not yet supported"

[[test]]
name = "word_boundary_partial_leading"
pattern = '\b11'
input = " 11"
matches = [[1, 3]]
ignore = true
reason = "\\b word boundary not yet supported"

[[test]]
name = "word_boundary_partial_trailing_bare"
pattern = '11\b'
input = "11"
matches = [[0, 2]]
ignore = true
reason = "\\b word boundary not yet supported"

[[test]]
name = "word_boundary_partial_trailing_space"
pattern = '11\b'
input = "11 "
matches = [[0, 2]]
ignore = true
reason = "\\b word boundary not yet supported"

[[test]]
name = "word_boundary_contains_a"
pattern = '\b\w*a\w*\b'
input = "ffaff"
matches = [[0, 5]]
ignore = true
reason = "\\b word boundary not yet supported"

[[test]]
name = "word_boundary_then_any"
pattern = 'a\b.*'
input = "a-ffff"
matches = [[0, 6]]

[[test]]
name = "word_boundary_trailing"
pattern = 'a\b'
input = "a "
matches = [[0, 1]]
ignore = true
reason = "\\b word boundary not yet supported"

[[test]]
name = "word_boundary_dash_1"
pattern = '\b-'
input = "1-2"
matches = [[1, 2]]
ignore = true
reason = "\\b word boundary not yet supported"

[[test]]
name = "word_boundary_dash_2"
pattern = '1\b-'
input = "1-2"
matches = [[0, 2]]
ignore = true
reason = "\\b word boundary not yet supported"

[[test]]
name = "word_boundary_dash_3"
pattern = '1\b-2'
input = "1-2"
matches = [[0, 3]]
ignore = true
reason = "\\b word boundary not yet supported"

# -- character classes --

[[test]]
name = "charclass_negated_bounded_4"
pattern = 'a[^a]{0,4}a'
input = " a____a "
matches = [[1, 7]]

[[test]]
name = "charclass_negated_bounded_5"
pattern = 'a[^a]{0,5}a'
input = " a____a "
matches = [[1, 7]]

[[test]]
name = "charclass_slash_dot"
pattern = "[a-z0-9.-]{1,}/[a-z0-9.-_]{1,}"
input = "a/."
matches = [[0, 3]]

[[test]]
name = "charclass_quoted_punct_match"
pattern = '''["'][^"']{0,30}[?!\.]["']'''
input = ' "hello!" '
matches = [[1, 9]]

[[test]]
name = "charclass_quoted_punct_no_match"
pattern = '''["'][^"']{0,30}[?!\.]["']'''
input = ' hello!" '
matches = []

# -- quantifiers --

[[test]]
name = "quantifier_bounded_repeat_1"
pattern = "ab{0,5}c"
input = "bbabbbbbc"
matches = [[2, 9]]

[[test]]
name = "quantifier_bounded_repeat_2"
pattern = "ab{0,5}c"
input = "bbbabbbbc"
matches = [[3, 9]]

[[test]]
name = "quantifier_bounded_repeat_3"
pattern = "ab{0,5}c"
input = "bbbbabbbc"
matches = [[4, 9]]

[[test]]
name = "quantifier_bounded_repeat_4"
pattern = "ab{0,5}c"
input = "bbbbbbbac"
matches = [[7, 9]]

[[test]]
name = "quantifier_bounded_repeat_5"
pattern = "ab{0,5}c"
input = "bbabbbcbbac"
matches = [[2, 7], [9, 11]]

[[test]]
name = "quantifier_group_plus"
pattern = "(ab)+"
input = "__abab__ab__"
matches = [[2, 6], [8, 10]]

[[test]]
name = "quantifier_a_plus"
pattern = "a+"
input = " aaa "
matches = [[1, 4]]

[[test]]
name = "quantifier_a_star_1"
pattern = "a*"
input = "bbbbaaabbbbb"
matches = [[0,0],[1,1],[2,2],[3,3],[4,7],[7,7],[8,8],[9,9],[10,10],[11,11],[12,12]]
ignore = true
reason = "duplicate match at pos 0 for nullable patterns"

[[test]]
name = "quantifier_a_star_2"
pattern = "a*"
input = "bbbb"
matches = [[0,0],[1,1],[2,2],[3,3],[4,4]]
ignore = true
reason = "duplicate match at pos 0 for nullable patterns"

[[test]]
name = "quantifier_wildcard_star"
pattern = "_*"
input = ""
matches = [[0, 0]]
ignore = true
reason = "find_all returns empty on empty input"

[[test]]
name = "quantifier_greedy_a3"
pattern = ".*a{3}"
input = "aa aaa"
matches = [[0, 6]]

# -- groups and alternation --

[[test]]
name = "alt_or_any"
pattern = ".*b|a"
input = " aaab "
matches = [[0, 5]]

[[test]]
name = "alt_no_match_url"
pattern = '(\s|\n|^)(\w+://[^\s\n]+)'
input = '<a href="http://acme.com">http://www.acme.com</a>'
matches = []

[[test]]
name = "dot_dot_g"
pattern = "..g"
input = "dfdff dfggg gfgdfg gddfdf"
matches = [[6, 9], [10, 13], [15, 18]]

# -- complex real-world --

[[test]]
name = "real_ip_address"
pattern = '^(\d{1,2}|1\d\d|2[0-4]\d|25[0-5])\.(\d{1,2}|1\d\d|2[0-4]\d|25[0-5])\.(\d{1,2}|1\d\d|2[0-4]\d|25[0-5])\.(\d{1,2}|1\d\d|2[0-4]\d|25[0-5])$'
input = "0.0.0.0"
matches = [[0, 7]]

[[test]]
name = "real_phone_intl"
pattern = '^(\(?\+?[0-9]*\)?)?[0-9_\- \(\)]*$'
input = "(+44)(0)20-12341234"
matches = [[0, 19]]

[[test]]
name = "real_phone_us"
pattern = '^([0-9]( |-)?)?(\(?[0-9]{3}\)?|[0-9]{3})( |-)?([0-9]{3}( |-)?[0-9]{4}|[a-zA-Z0-9]{7})$'
input = "1-(123)-123-1234"
matches = [[0, 16]]

[[test]]
name = "real_address_no_match"
pattern = '\d{1,3}.?\d{0,3}\s[a-zA-Z]{2,30}\s[a-zA-Z]{2,15}'
input = "65 Beechworth/ Rd"
matches = []

[[test]]
name = "real_date"
pattern = '((\d{2})|(\d))\/((\d{2})|(\d))\/((\d{4})|(\d{2}))'
input = "4/05/89"
matches = [[0, 7]]

[[test]]
name = "real_port_range"
pattern = '^(6[0-4]\d\d\d|65[0-4]\d\d|655[0-2]\d|6553[0-5])$'
input = "65535"
matches = [[0, 5]]

[[test]]
name = "real_currency_no_match"
pattern = '(^\d{3,5}\,\d{2}$)|(^\d{3,5}$)'
input = "1300333444"
matches = []

[[test]]
name = "real_large_alternation"
pattern = "[du]{2}|[gu]{2}|[tu]{2}|[ds]{2}|[gs]{2}|[da]{2}|[ga]{2}|[ta]{2}|[dq]{2}|[gq]{2}|[tq]{2}|[DU]{2}|[GU]{2}|[TU]{2}|[DS]{2}|[GS]{2}|[DA]{2}|[GA]{2}|[TA]{2}|[DQ]{2}|[GQ]{2}|[TQ]{2}"
input = "DU"
matches = [[0, 2]]

[[test]]
name = "real_html_comment"
pattern = '<!--[\s\S]*--[ \t]*>'
input = "<!-- anything -- >"
matches = [[0, 18]]

# -- RE# wildcard underscore --

[[test]]
name = "wildcard_contains_a"
pattern = "_*a_*"
input = "bbabb"
matches = [[0, 5]]

[[test]]
name = "wildcard_escaped_underscore"
pattern = 'a\_b*'
input = "a_b"
matches = [[0, 3]]

[[test]]
name = "wildcard_class_attr"
pattern = 'class="_*'
input = 'class="dasdasdsdasd"'
matches = [[0, 20]]

# -- word boundary alternatives --

[[test]]
name = "wb_alt_begin_string_bare"
pattern = '(?<=\W|\A)11'
input = "11"
matches = [[0, 2]]

[[test]]
name = "wb_alt_begin_string_space"
pattern = '(?<=\W|\A)11'
input = " 11"
matches = [[1, 3]]

[[test]]
name = "wb_alt_end_string_bare"
pattern = '11(?=\W|\z)'
input = "11"
matches = [[0, 2]]

[[test]]
name = "wb_alt_end_string_space"
pattern = '11(?=\W|\z)'
input = "11 "
matches = [[0, 2]]

# -- word boundary alternation --

[[test]]
name = "wb_alternation_pm"
pattern = '(pm\b|p\.m\.|p\b|p m\b|p\. m\.\b|p\.m\b|p\. m\b)'
input = "p. m"
matches = [[0, 4]]
ignore = true
reason = "\\b word boundary not yet supported"

[[test]]
name = "wb_alternation_pm_simple"
pattern = '(pm\b|p\.m\.|p\b)'
input = "p. m"
matches = [[0, 1]]
ignore = true
reason = "\\b word boundary not yet supported"

[[test]]
name = "wb_alternation_pm_with_space"
pattern = '(pm\b|p\.m\.|p\b|p m\b)'
input = "p. m"
matches = [[0, 1]]
ignore = true
reason = "\\b word boundary not yet supported"

[[test]]
name = "wb_alternation_a"
pattern = '(aa|ab|a\b)'
input = "a c"
matches = [[0, 1]]
ignore = true
reason = "\\b word boundary not yet supported"

# -- date validation --

[[test]]
name = "real_date_validation"
pattern = '^((\d{2}(([02468][048])|([13579][26]))[\-\/\s]?((((0?[13578])|(1[02]))[\-\/\s]?((0?[1-9])|([1-2][0-9])|(3[01])))|(((0?[469])|(11))[\-\/\s]?((0?[1-9])|([1-2][0-9])|(30)))|(0?2[\-\/\s]?((0?[1-9])|([1-2][0-9])))))|(\d{2}(([02468][1235679])|([13579][01345789]))[\-\/\s]?((((0?[13578])|(1[02]))[\-\/\s]?((0?[1-9])|([1-2][0-9])|(3[01])))|(((0?[469])|(11))[\-\/\s]?((0?[1-9])|([1-2][0-9])|(30)))|(0?2[\-\/\s]?((0?[1-9])|(1[0-9])|(2[0-8]))))))(\s(((0?[1-9])|(1[0-2]))\:([0-5][0-9])((\s)|(\:([0-5][0-9])\s))([AM|PM|am|pm]{2,2})))?$'
input = "2004-2-29"
matches = [[0, 9]]
